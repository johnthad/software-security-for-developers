<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WebAuthn Demo</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; margin: 2rem; line-height: 1.4; }
    .row { display: flex; gap: .5rem; align-items: center; margin-bottom: 1rem; }
    label { font-weight: 600; }
    input { padding: .5rem; font-size: 1rem; }
    button { padding: .5rem .75rem; font-size: 1rem; }
    pre { background: #f6f8fa; padding: 1rem; border-radius: .5rem; overflow: auto; }
  </style>
</head>
<body>
  <h1>WebAuthn Demo</h1>

  <div class="row">
    <label for="username">Username</label>
    <input id="username" name="username" placeholder="alice" autocomplete="username" />
  </div>

  <div class="row">
    <button id="register">Register Credential</button>
    <button id="login">Sign In</button>
  </div>

  <pre id="out"></pre>

  <script src="script.js"></script>
</body>
</html>
